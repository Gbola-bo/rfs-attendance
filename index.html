<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFS Student Check-In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-page:       #ECEEF4;
            --bg-card:       #FFFFFF;
            --bg-surface:    #F4F5F8;
            --bg-input:      #FAFAFA;
            --accent:        #2B5CE6;
            --accent-dim:    rgba(43,92,230,0.10);
            --success-bg:    #EAF5EE;
            --success-text:  #1A6B3A;
            --error-bg:      #FEF0F0;
            --error-text:    #C0392B;
            --text-primary:  #181A20;
            --text-secondary:#5A5E6E;
            --text-muted:    #9EA3B5;
            --border:        rgba(0,0,0,0.08);
            --border-focus:  #2B5CE6;
            --radius-sm:     8px;
            --radius-md:     12px;
            --radius-lg:     20px;
            --shadow-card:   0 2px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-page);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }

        /* ── Card ── */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: rise 0.4s cubic-bezier(.22,.68,0,1.2) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to   { opacity: 1; transform: none; }
        }

        /* ── Header ── */
        .card-header {
            padding: 28px 28px 20px;
            border-bottom: 1px solid var(--border);
        }

        .school-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 99px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.2;
        }

        /* ── Preview strip ── */
        .preview-strip {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 24px;
        }

        .preview-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: var(--accent-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .preview-icon svg { width: 16px; height: 16px; color: var(--accent); }

        .preview-content { flex: 1; min-width: 0; }

        .preview-eyebrow {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 3px;
        }

        .preview-number {
            font-family: 'DM Mono', monospace;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 0.04em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-number .ph { color: var(--text-muted); }
        .preview-number .filled { color: var(--accent); }

        /* Location pill */
        .loc-pill {
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 600;
            padding: 5px 10px;
            border-radius: 99px;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s;
        }
        .loc-pill.loading { background: #FEF3C7; color: #92400E; }
        .loc-pill.ok      { background: var(--success-bg); color: var(--success-text); }
        .loc-pill.err     { background: var(--error-bg); color: var(--error-text); }

        /* ── Body ── */
        .card-body { padding: 24px 28px 28px; }

        /* ── Field grid ── */
        .field-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }

        .field label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .field .hint {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .field .err-text {
            font-size: 11px;
            color: var(--error-text);
            display: none;
        }
        .field .err-text.show { display: block; }

        input[type="text"] {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'DM Mono', monospace;
            font-size: 17px;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: 0.06em;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
            -webkit-appearance: none;
        }

        input[type="text"]::placeholder { color: var(--text-muted); }

        input[type="text"]:focus {
            border-color: var(--border-focus);
            background: #fff;
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        input[type="text"].invalid {
            border-color: #E24B4A;
            box-shadow: 0 0 0 3px rgba(226,75,74,0.10);
        }

        /* ── Submit ── */
        .submit-btn {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.15s, background 0.2s;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:enabled {
            background: var(--accent);
            color: #fff;
        }

        .submit-btn:disabled {
            background: var(--bg-surface);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .submit-btn:enabled:hover  { opacity: 0.88; }
        .submit-btn:enabled:active { transform: scale(0.98); }

        .submit-btn .btn-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Status message (after submit) ── */
        #statusMessage {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        #statusMessage.success { background: var(--success-bg); color: var(--success-text); display: block; }
        #statusMessage.error   { background: var(--error-bg);   color: var(--error-text);   display: block; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="school-badge">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
            Rock Foundation School
        </div>
        <h1 class="card-title">Student Check-In</h1>
    </div>

    <div class="card-body">
        <!-- Live preview strip -->
        <div class="preview-strip">
            <div class="preview-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="14" height="13" rx="2"/>
                    <path d="M7 4V2M13 4V2M3 8h14"/>
                </svg>
            </div>
            <div class="preview-content">
                <div class="preview-eyebrow">Registration Number</div>
                <div class="preview-number">
                    RFS&nbsp;/&nbsp;<span id="yearStreamDisplay" class="ph">____</span>&nbsp;/&nbsp;<span id="serialDisplay" class="ph">___</span>
                </div>
            </div>
            <div class="loc-pill loading" id="locationStatus">Locating…</div>
        </div>

        <!-- Inputs -->
        <form id="checkInForm" novalidate>
            <div class="field-grid">
                <div class="field">
                    <label for="yearStream">Year &amp; Stream</label>
                    <input type="text" id="yearStream" maxlength="4" placeholder="2601" autocomplete="off" inputmode="numeric">
                    <span class="hint">Year (20–99) + Stream (01–03)</span>
                    <span class="err-text" id="yearStreamError"></span>
                </div>
                <div class="field">
                    <label for="serial">Student Number</label>
                    <input type="text" id="serial" maxlength="3" placeholder="001" autocomplete="off" inputmode="numeric">
                    <span class="hint">001 to 999</span>
                    <span class="err-text" id="serialError"></span>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn" disabled>
                <span class="btn-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 8 7 12 13 4"/>
                    </svg>
                </span>
                Check In Now
            </button>
        </form>

        <div id="statusMessage"></div>
    </div>
</div>

<script>
    // ── Config ────────────────────────────────────────────
    const SCRIPT_URL     = 'https://script.google.com/macros/s/AKfycbwCLL5skg96Twv3y8AyO_K2XDRccHagRB6Rmsj0nn7IGa9k8A6m96i83F2R4GuxSP8egw/exec';
    const CAMPUS_LAT     = 6.44059;
    const CAMPUS_LNG     = 3.50089;
    const MAX_DISTANCE_M = 500;

    // ── DOM refs ──────────────────────────────────────────
    const yearStreamInput   = document.getElementById('yearStream');
    const serialInput       = document.getElementById('serial');
    const yearStreamDisplay = document.getElementById('yearStreamDisplay');
    const serialDisplay     = document.getElementById('serialDisplay');
    const yearStreamError   = document.getElementById('yearStreamError');
    const serialError       = document.getElementById('serialError');
    const locPill           = document.getElementById('locationStatus');
    const submitBtn         = document.getElementById('submitBtn');
    const statusMessage     = document.getElementById('statusMessage');
    const form              = document.getElementById('checkInForm');

    let userLocation = null;

    // ── Haversine distance ────────────────────────────────
    function calcDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ── Geolocation ───────────────────────────────────────
    function getLocation() {
        if (!navigator.geolocation) {
            locPill.textContent = 'Not supported';
            locPill.className = 'loc-pill err';
            return;
        }
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                userLocation = { latitude: pos.coords.latitude, longitude: pos.coords.longitude };
                const dist = calcDistance(CAMPUS_LAT, CAMPUS_LNG, userLocation.latitude, userLocation.longitude);
                if (dist <= MAX_DISTANCE_M) {
                    locPill.textContent = 'On campus';
                    locPill.className = 'loc-pill ok';
                } else {
                    locPill.textContent = (dist / 1000).toFixed(2) + 'km away';
                    locPill.className = 'loc-pill err';
                }
            },
            function() {
                locPill.textContent = 'Access denied';
                locPill.className = 'loc-pill err';
            },
            { timeout: 8000, enableHighAccuracy: true }
        );
    }

    // ── Live preview ──────────────────────────────────────
    function updatePreview() {
        const ys = yearStreamInput.value;
        const sn = serialInput.value;
        const ysOk = isValidYS(ys);
        const snOk = isValidSN(sn);

        yearStreamDisplay.textContent = ys ? ys.padEnd(4, '_') : '____';
        yearStreamDisplay.className   = ysOk ? 'filled' : 'ph';

        serialDisplay.textContent = sn ? sn.padEnd(3, '_') : '___';
        serialDisplay.className   = snOk ? 'filled' : 'ph';

        submitBtn.disabled = !(ysOk && snOk);
    }

    // ── Validation ────────────────────────────────────────
    function isValidYS(v) {
        if (!/^\d{4}$/.test(v)) return false;
        if (parseInt(v.slice(0, 2)) < 20) return false;
        if (!['01', '02', '03'].includes(v.slice(2))) return false;
        return true;
    }

    function isValidSN(v) {
        return /^\d{3}$/.test(v) && parseInt(v) >= 1;
    }

    function showErr(input, el, msg) {
        input.classList.add('invalid');
        el.textContent = msg;
        el.classList.add('show');
        return false;
    }

    function clearErr(input, el) {
        input.classList.remove('invalid');
        el.classList.remove('show');
    }

    function validateYearStream() {
        const v = yearStreamInput.value;
        clearErr(yearStreamInput, yearStreamError);
        if (!v) return true;
        if (!/^\d{4}$/.test(v))             return showErr(yearStreamInput, yearStreamError, 'Must be exactly 4 digits');
        if (parseInt(v.slice(0, 2)) < 20)   return showErr(yearStreamInput, yearStreamError, 'Year must be 20–99');
        if (!['01','02','03'].includes(v.slice(2))) return showErr(yearStreamInput, yearStreamError, 'Stream must be 01, 02, or 03');
        return true;
    }

    function validateSerial() {
        const v = serialInput.value;
        clearErr(serialInput, serialError);
        if (!v) return true;
        if (!/^\d{3}$/.test(v))  return showErr(serialInput, serialError, 'Must be exactly 3 digits');
        if (parseInt(v) < 1)     return showErr(serialInput, serialError, 'Must be between 001 and 999');
        return true;
    }

    yearStreamInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0, 4);
        validateYearStream();
        updatePreview();
    });

    serialInput.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(0, 3);
        validateSerial();
        updatePreview();
    });

    // ── Status helper ─────────────────────────────────────
    function showStatus(type, msg) {
        statusMessage.className = type;
        statusMessage.textContent = msg;
        statusMessage.style.display = 'block';
        if (type === 'success') {
            setTimeout(() => { statusMessage.style.display = 'none'; }, 5000);
        }
    }

    const BTN_DEFAULT = `<span class="btn-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 8 7 12 13 4"/></svg></span>Check In Now`;

    // ── Submit ────────────────────────────────────────────
    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        if (!userLocation) {
            showStatus('error', 'Location not available — please allow location access and try again.');
            return;
        }

        const dist = calcDistance(CAMPUS_LAT, CAMPUS_LNG, userLocation.latitude, userLocation.longitude);
        if (dist > MAX_DISTANCE_M) {
            showStatus('error', 'You must be on campus to check in. You are ' + (dist / 1000).toFixed(2) + 'km away.');
            return;
        }

        if (!validateYearStream() || !validateSerial()) {
            showStatus('error', 'Please fix the errors above before submitting.');
            return;
        }

        if (!yearStreamInput.value || !serialInput.value) {
            showStatus('error', 'Please fill in all fields.');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span style="font-size:14px">Checking in…</span>';

        try {
            const url = SCRIPT_URL
                + '?yearStream=' + encodeURIComponent(yearStreamInput.value)
                + '&serial='     + encodeURIComponent(serialInput.value)
                + '&latitude='   + encodeURIComponent(userLocation.latitude)
                + '&longitude='  + encodeURIComponent(userLocation.longitude);

            const response = await fetch(url);
            const data = await response.json();

            if (data.status === 'success') {
                showStatus('success', 'Checked in! Reg: ' + data.regNumber);
                form.reset();
                yearStreamDisplay.textContent = '____';
                yearStreamDisplay.className   = 'ph';
                serialDisplay.textContent     = '___';
                serialDisplay.className       = 'ph';
                submitBtn.innerHTML = BTN_DEFAULT;
            } else {
                showStatus('error', data.message || 'Check-in failed.');
            }
        } catch (err) {
            showStatus('error', 'Connection error — please try again.');
        } finally {
            submitBtn.disabled = false;
            if (!statusMessage.className.includes('success')) {
                submitBtn.innerHTML = BTN_DEFAULT;
            }
        }
    });

    // ── Init ──────────────────────────────────────────────
    getLocation();
</script>
</body>
</html>
